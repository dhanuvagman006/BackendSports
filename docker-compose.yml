services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sportyqo
      POSTGRES_PASSWORD: sportyqo
      POSTGRES_DB: sportyqo
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportyqo"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  minio-init:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/sportyqo || true"

  api:
    build: .
    depends_on:
      db: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      DATABASE_URL: postgres://sportyqo:sportyqo@db:5432/sportyqo
      S3_ENDPOINT: http://minio:9000
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
    ports: ["8080:8080"]
    command: sh -c "npm run migrate && npm run seed && npm start"

volumes:
  pgdata:
  miniodata:
